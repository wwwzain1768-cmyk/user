<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأبراج - المستخدم</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body>
    <div id="network-status" class="status-banner" style="display: none;"><span id="network-status-text"></span><button id="dismiss-network-status" class="dismiss-status-btn" onclick="dismissNetworkStatus()">×</button></div>

    <div id="auth-screen" class="greeting-screen" style="z-index: 10001; flex-direction: column; display: flex;">
        <div class="greeting-box">
            <h2 class="animate-text" style="margin-bottom: 20px;">تسجيل الدخول</h2>
            <button id="google-login-btn" class="secondary-btn" onclick="loginWithGoogle()">تسجيل بواسطة Google</button>
        </div>
    </div>

    <div id="customModal" class="custom-modal" style="display: none;">
        <div class="modal-content">
            <p id="modalMsg"></p>
            <div class="modal-actions" id="modalActions"></div>
        </div>
    </div>

    <div id="inputModal" class="custom-modal" style="display: none;">
        <div class="modal-content">
            <p id="inputModalMsg"></p>
            <div class="form-group" style="padding:0; margin-bottom:15px;">
                <input type="number" id="inputModalValue" placeholder="أدخل الرقم هنا...">
            </div>
            <div class="modal-actions" id="inputModalActions"></div>
        </div>
    </div>

    <div id="noteModal" class="custom-modal" style="display: none;">
        <div class="modal-content">
            <p id="noteModalMsg"></p>
            <div class="form-group" style="padding:0; margin-bottom:15px;">
                <input type="text" id="noteModalValue" placeholder="أدخل الملاحظة هنا...">
            </div>
            <div class="modal-actions" id="noteModalActions"></div>
        </div>
    </div>

    <div id="historyModal" class="custom-modal" style="display: none;">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
            <p style="font-size: 1.3rem; color: #2c3e50; font-weight: bold; margin-bottom: 15px;">السجل الكامل</p>
            <div id="historyContent" style="text-align: right; margin-bottom: 20px;"></div>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="document.getElementById('historyModal').style.display='none'">إغلاق</button>
            </div>
        </div>
    </div>

    <div id="login-section" class="main-container" style="display: none;">
        <h2>أهلاً بك، أدخل كلمة سر (رمز) البرج</h2>
        <div class="form-group">
            <input type="password" id="enteredCode" placeholder="أدخل الرمز هنا...">
        </div>
        <button class="primary-btn" onclick="checkCode()">تسجيل الدخول</button>
        <p id="error-msg" class="error-msg"></p>
    </div>

    <div id="greeting-section" class="greeting-screen" style="display: none;">
        <div class="greeting-box">
            <h2 id="greeting-text" class="animate-text"></h2>
            <div class="action-btns">
                <button class="primary-btn" onclick="confirmIdentity()">نعم، متابعة</button>
                <button class="secondary-btn" onclick="cancelLogin()">لا، رجوع</button>
            </div>
        </div>
    </div>

    <div id="dashboard-section" class="main-container dashboard-container" style="display: none; padding-top: 30px;">
        <div class="form-group" style="display: flex; gap: 10px; padding: 0 30px; margin-bottom: 20px;">
            <input type="text" id="searchInput" placeholder="بحث عن زبون..." onkeyup="searchCustomers()" style="flex: 1; padding: 15px; border: 2px solid #bdc3c7; border-radius: 8px; font-size: 1.1rem; text-align: right; outline: none;">
            <button class="primary-btn" id="searchBtn" onclick="searchCustomers()" style="width: auto; margin-bottom: 0; padding: 0 20px;">بحث</button>
        </div>

        <div id="search-offline-block" class="search-offline-block" style="display: none;">
            🚫 البحث غير متاح في وضع عدم الاتصال (أوفلاين)
        </div>

        <div class="dashboard-top-actions"><button class="primary-btn top-action-btn" onclick="toggleAddForm()">إضافة زبون</button><button class="secondary-btn top-action-btn" onclick="switchAccount()">تبديل حساب</button></div>

        <div id="addCustomerSection" style="display: none; margin-bottom: 30px; border-bottom: 2px solid #ecf0f1; padding-bottom: 20px;">
            <h2>إضافة زبون جديد للبرج</h2>
            <div class="form-group"><input type="text" id="customerName" placeholder="اسم الزبون"></div>
            <div class="form-group"><input type="number" id="customerPrice" placeholder="مبلغ الاشتراك (مثال: 50000)"></div>
            <div class="form-group"><input type="date" id="startDate" placeholder="تاريخ البدء"></div>
            <div class="form-group"><input type="date" id="endDate" placeholder="تاريخ الانتهاء"></div>
            <button class="primary-btn" id="saveCustomerBtn" onclick="addCustomer()">حفظ بيانات الزبون</button>
            <button class="secondary-btn" onclick="toggleAddForm()" style="width: calc(100% - 60px); margin: 0 30px;">إلغاء</button>
        </div>

        <div class="dashboard-stats">
            <div class="stat-box">عدد المشتركين<br><span id="towerSubscribers">0</span></div>
            <div class="stat-box">الدين الكلي<br><span id="towerDebt">0</span></div>
        </div>
        
        <div class="tabs-header" style="margin: 20px 30px; border-radius: 8px; overflow: hidden; display: flex; background-color: #ecf0f1;">
            <button class="tab-btn active" onclick="switchCustomerTab('all')">جميع الزبائن</button>
            <button class="tab-btn" onclick="switchCustomerTab('expired')">المنتهي</button>
        </div>

        <div id="all-customers-tab" class="customer-tab-content active">
            <div id="customersList" class="customers-list"></div>
        </div>

        <div id="expired-customers-tab" class="customer-tab-content">
            <div id="expiredList" class="customers-list"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
